server:
  port: 9999
spring:
  application:
    name: SMALL PROJECT
  flyway:
    enable: true
    locations: classpath:database/migrations
    baseline-on-migrate: true


  datasource:
    url: jdbc:postgresql://localhost:5432/small_project_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create   # update / create-drop / validate / none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
